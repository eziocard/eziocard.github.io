<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./script.js" defer></script>

    <title>TODOLIST</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <header>
        <h1>Todo List</h1>
    </header> 
    <section>
        <form id="formulario">
            <label for="tarea">Ingresar Tareas</label>
            <input type="text" id="tarea" placeholder="ingresar Tareas" required>
            <button type="submit">agregar</button>
            
        </form>
    </section>
    <section id = "filtros">
        <button onclick="filtrarCompletados()">Filtrar Completados</button>
        <button onclick="mostrarTodo()">Mostrar Todo</button>
    </section>
    <section>
        <table id = 'tabla'>
        <caption id = 'titulo-tabla'>Lista Tareas</caption>
        <tr>
            <th>Id</th>
            <th>Tarea</th>
            <th>Completada</th>
            <th>Borrar</th>
        </tr>
        <tr id = 'fila-vacia'>
            <td>0</th>
            <td>No hay tareas agregadas</td>
            <td><input type="checkbox" name="checkbox" value="si" disabled></td>
            <td><button disabled>x</button></td>
        </tr>
      
        </table>
    </section>
</body>
</html>
